name: Python Skills Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Test SS Crawler
      run: |
        python skills/ss_crawler.py --test
    
    - name: Test Config Generator
      run: |
        echo '{"nodes":[{"server":"1.2.3.4","port":8388,"password":"test","method":"aes-256-gcm","type":"ss"}]}' > test_nodes.json
        python skills/singbox_config_generator.py --input test_nodes.json --output test_config.json
    
    - name: Syntax Check All Skills
      run: |
        python -m py_compile skills/*.py
    
    - name: Clean up
      run: |
        rm -f test_nodes.json test_config.json

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8
    
    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 skills/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 skills/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
